name: Publish npm package

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish
        required: true
        default: main

jobs:
  publish:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          startsWith(github.event.workflow_run.head_branch, 'v')
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref }}

      - name: Verify package version matches tag
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          PACKAGE_TAG="v$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_TAG" != "${{ github.event.workflow_run.head_branch }}" ]; then
            echo "package.json version $PACKAGE_TAG does not match tag ${{ github.event.workflow_run.head_branch }}"
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --access public --provenance
